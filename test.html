<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Login Test</title></head>
<body>
<h2>Login Test</h2>
<div>API Health: <span id="health">...</span></div>
<div>Server Sync: <span id="sync">...</span></div>
<div>pk-sync.json: <span id="pksync">...</span></div>
<div>localStorage pk_users: <span id="ls">...</span></div>
<div style="margin-top:10px">
  Account: <input id="acc" value="燃脂侠">
  Password: <input id="pwd" value="">
  <button onclick="testLogin()">Test Login</button>
</div>
<div style="margin-top:10px;color:red" id="result"></div>
<script>
const BASE = window.location.origin;
async function init() {
  // Health
  try {
    const r = await (await fetch(BASE+'/api/health')).json();
    document.getElementById('health').textContent = r.status;
  } catch(e) { document.getElementById('health').textContent = 'FAIL: '+e.message; }

  // Sync
  try {
    const r = await (await fetch(BASE+'/api/sync')).json();
    document.getElementById('sync').textContent = 'pk_users=' + JSON.stringify(r.pk_users) + ' accounts=' + JSON.stringify(r.accounts);
  } catch(e) { document.getElementById('sync').textContent = 'FAIL: '+e.message; }

  // pk-sync.json
  try {
    const r = await (await fetch(BASE+'/pk-sync.json')).json();
    document.getElementById('pksync').textContent = '_users keys: ' + (r._users ? Object.keys(r._users).join(',') : 'NONE');
  } catch(e) { document.getElementById('pksync').textContent = 'FAIL: '+e.message; }

  // localStorage
  const lu = localStorage.getItem('pk_users');
  document.getElementById('ls').textContent = lu || '(empty)';
}
init();

function testLogin() {
  const acc = document.getElementById('acc').value.trim();
  const pwd = document.getElementById('pwd').value;
  const lu = localStorage.getItem('pk_users');
  document.getElementById('result').textContent = '';

  if (!lu) {
    document.getElementById('result').textContent = 'FAIL: localStorage pk_users is empty. initData NOT loaded users.';
    return;
  }
  try {
    const users = JSON.parse(lu);
    if (!users[acc]) {
      document.getElementById('result').textContent = 'FAIL: Account "' + acc + '" not found. Available: ' + Object.keys(users).join(', ');
      return;
    }
    if (users[acc].password !== pwd) {
      document.getElementById('result').textContent = 'FAIL: Password mismatch. Expected len=' + users[acc].password.length + ' got len=' + pwd.length;
      return;
    }
    document.getElementById('result').style.color = 'green';
    document.getElementById('result').textContent = 'SUCCESS: Login would work for ' + acc + ' (role: ' + users[acc].role + ')';
  } catch(e) {
    document.getElementById('result').textContent = 'FAIL: JSON parse error: ' + e.message;
  }
}
</script>
</body></html>
